MODEL:
  META_ARCHITECTURE: "DiffusionDet"
#  WEIGHTS: "/root/autodl-tmp/project/DiffusionDet-main/output/model_0009999.pth"
#  WEIGHTS: "/root/autodl-tmp/project/DiffusionDet-main/models/diffdet_coco_res50_300boxes.pth"
  # For training from scratch, use ImageNet pretrained ResNet-50 (auto-downloaded)
  WEIGHTS: "detectron2://ImageNetPretrained/torchvision/R-50.pkl"
  PIXEL_MEAN: [23.7354,23.7354, 23.7354]
  PIXEL_STD: [27.256,27.256, 27.256]
  BACKBONE:
    NAME: "build_resnet_fpn_backbone"
  RESNETS:
    OUT_FEATURES: ["res2", "res3", "res4", "res5"]
  FPN:
    IN_FEATURES: ["res2", "res3", "res4", "res5"]
  ROI_HEADS:
    IN_FEATURES: ["p2", "p3", "p4", "p5"]
  ROI_BOX_HEAD:
    POOLER_TYPE: "ROIAlignV2"
    POOLER_RESOLUTION: 7
    POOLER_SAMPLING_RATIO: 2
SOLVER:
  IMS_PER_BATCH: 4
#  IMS_PER_BATCH: 8
#  BASE_LR: 0.000025
  BASE_LR: 0.000005
  STEPS: (25000, 32000)
  MAX_ITER: 36500
  WARMUP_FACTOR: 0.01
  WARMUP_ITERS: 1000
  WEIGHT_DECAY: 0.0001
  OPTIMIZER: "ADAMW"
  BACKBONE_MULTIPLIER: 1.0  # keep same with BASE_LR.
  CLIP_GRADIENTS:
    ENABLED: True
    CLIP_TYPE: "full_model"
    CLIP_VALUE: 1.0
    NORM_TYPE: 2.0
SEED: 40244023
INPUT:
  MIN_SIZE_TRAIN: (800,1000,1200,1500)
#  MAX_SIZE_TRAIN:1500
#  MIN_SIZE_TEST:800
#  MAX_SIZE_TEST:1500
  CROP:
    ENABLED: False
    TYPE: "absolute_range"
#    SIZE: (224,224)
  FORMAT: "RGB"
TEST:
#  EVAL_PERIOD: 7330
#  EVAL_PERIOD: 5000
  EVAL_PERIOD: 3000
DATALOADER:
  FILTER_EMPTY_ANNOTATIONS: False
  NUM_WORKERS: 4
VERSION: 2
